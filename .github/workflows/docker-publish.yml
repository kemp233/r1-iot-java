name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 升级到 Java 17 以支持最新的 Maven 插件
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. 设置 Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: 'r1-web/package-lock.json'

      # 3. 构建前端 (CI=false 避免警告导致中断)
      - name: Build Frontend Manually
        working-directory: ./r1-web
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          CI: false
          NODE_OPTIONS: "--max_old_space_size=4096"

      # 4. 使用 Maven 打包
      - name: Build Backend with Maven
        run: |
          mvn clean package -DskipTests \
          -Dskip.installnodenpm=true \
          -Dskip.npm=true

      # 5. 【关键修复】动态修改 Dockerfile 中的基础镜像
      # 原项目 Dockerfile 用的是 openjdk:8-jdk-alpine，它不支持 Java 17 的 JAR 包
      # 我们在构建前把它改成支持 Java 17 的轻量化镜像
      - name: Patch Dockerfile for Java 17
        run: |
          sed -i 's/openjdk:8-jdk-alpine/eclipse-temurin:17-jre-alpine/g' Dockerfile
          # 顺便确保 JAR 文件路径正确 (针对多模块项目)
          # 如果你的 jar 还在 r1-server/target 目录下，可以取消下面这一行的注释：
          # cp r1-server/target/*.jar target/r1-iot-java.jar || true

      # 6. 设置多架构环境
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. 登录 GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 8. 构建并推送 amd64 和 arm64
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
