name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # 使用 20.04 以获得更好的旧软件兼容性
    runs-on: ubuntu-20.04 
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 设置 Java 环境
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 2. 设置 Node.js 14 (旧项目最稳定的版本)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '14'
          cache: 'npm'
          cache-dependency-path: 'r1-web/package-lock.json'

      # 3. 手动构建前端 (跳过 Maven 插件的自动下载)
      - name: Build Frontend Manually
        working-directory: ./r1-web
        run: |
          npm install --legacy-peer-deps
          npm run build:prod || npm run build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      # 4. 使用 Maven 打包 Java (跳过前端安装和构建步骤)
      - name: Build Backend with Maven
        # 关键：通过参数跳过 frontend-maven-plugin 的执行
        run: |
          mvn clean package -DskipTests \
          -Dskip.installnodenpm=true \
          -Dskip.npm=true

      # 5. 设置 QEMU 和 Buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 6. 登录 GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 7. 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 这样可以确保构建出来的 jar 被加入镜像
          cache-from: type=gha
          cache-to: type=gha,mode=max
