name: Build and Push Multi-Arch Docker Image

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # 改回最新的镜像，确保能快速分配到 runner
    runs-on: ubuntu-latest 
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 设置 Java 8
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 2. 设置 Node.js 16 (比 14 更现代，但在 ubuntu-latest 上兼容性更好)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'
          cache-dependency-path: 'r1-web/package-lock.json'

      # 3. 手动构建前端
      - name: Build Frontend Manually
        working-directory: ./r1-web
        run: |
          # 忽略依赖冲突，这是旧项目的必备参数
          npm install --legacy-peer-deps
          # 执行构建
          npm run build:prod || npm run build
        env:
          # 解决旧 Webpack 在 Node 17+ 上的 OpenSSL 兼容问题
          NODE_OPTIONS: "--openssl-legacy-provider --max_old_space_size=4096"

      # 4. 使用 Maven 打包 Java
      - name: Build Backend with Maven
        # 跳过 Maven 插件自带的前端安装和运行步骤，直接使用上一步生成的文件
        run: |
          mvn clean package -DskipTests \
          -Dskip.installnodenpm=true \
          -Dskip.npm=true

      # 5. 设置 QEMU (支持 arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      # 6. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. 登录 GHCR
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 8. 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 缓存可以大幅提升后续构建速度
          cache-from: type=gha
          cache-to: type=gha,mode=max
